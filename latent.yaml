name: latentCoT
channels:
  - defaults
dependencies:
  - python=3.12.12
  - pip
  - setuptools
  - wheel
  - pip:
      # ---- core stack (choose ONE coherent base) ----
      - torch==2.7.1
      - triton==3.3.1

      # ---- HF stack ----
      - transformers==4.57.0
      - tokenizers==0.22.1
      - datasets==3.6.0
      - accelerate==1.7.0
      - huggingface-hub

      # ---- logging ----
      - wandb==0.18.7

      # ---- common utilities (leave unpinned unless you have a reason) ----
      - numpy
      - tqdm
      - pyyaml
      - rich
      - regex
      - safetensors
      - sentencepiece
      - protobuf
      - pillow
      - requests
