model:
  device: "cuda"
  base_model_name_or_path: "${MODEL_DIR}/Qwen3-1.7B"   # base config/tokenizer
  tokenizer_name_or_path: "${MODEL_DIR}/Qwen3-1.7B"
  checkpoint_path: "${PROJECT_ROOT}/models/coconut_reproduction/prontoqa-coconut-qwen1.7b/checkpoint_10"
  add_latent_tokens: true
  # Coconut training adds three special tokens in order: <|start-latent|>, <|end-latent|>, <|latent|>.
  start_latent_token_str: "<|start-latent|>"
  end_latent_token_str: "<|end-latent|>"
  latent_token_str: "<|latent|>"
  latent_init_token: "<<"   # match official init source token
  num_latent_placeholders: 6   # c_thought=2, max_latent_stage=3 -> 6 latent slots
  teacher_target_template: "### {answer}"
  use_coconut_question_only: true
  align_latent_padding: true
generation_kwargs:
  max_new_tokens: 128        # align with original coconut.generate default (16) but allow longer
  temperature: 1.0          # coconut.generate is greedy; temperature is unused
dataset_name: prontoqa
dataset_path: "data/protoqa_local.jsonl"
prompt_template: "{question}\nAnswer:"
steps: "1,2,3,4,5,6"
max_mean_steps: 6
